################################################################################
# 🍀 Shamrock Node-RED — Docker Compose
################################################################################
#
# Usage:
#   docker-compose up -d                # Start in background
#   docker-compose logs -f shamrock-nr  # Watch logs
#   docker-compose down                 # Stop
#   docker-compose up -d --build        # Rebuild + restart
#
# Required: Copy .env.example to .env and fill in all values before starting.
#
################################################################################
version: "3.8"

services:
  shamrock-nr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shamrock-node-red
    restart: unless-stopped
    
    environment:
      - TZ=America/New_York
      - NODE_RED_CREDENTIAL_SECRET=${NR_CREDENTIAL_SECRET:-shamrock-bail-2026}
      - NR_ADMIN_HASH=${NR_ADMIN_HASH}
      # ── Base URL (used by Configure Global Vars to build webhook endpoints) ──
      - NODE_RED_BASE_URL=${NODE_RED_BASE_URL:-http://localhost:1880}
      # ── GAS ──
      - GAS_WEBHOOK_URL=${GAS_WEBHOOK_URL}
      - GAS_API_KEY=${GAS_API_KEY}
      # ── Slack ──
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#ops-alerts}
      - SLACK_WEBHOOK_OPS=${SLACK_WEBHOOK_OPS}
      - SLACK_WEBHOOK_ALERTS=${SLACK_WEBHOOK_ALERTS}
      - SLACK_WEBHOOK_LEADS=${SLACK_WEBHOOK_LEADS}
      # ── Twilio ──
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - TWILIO_WA_NUMBER=${TWILIO_WA_NUMBER}
      # ── ElevenLabs ──
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_AGENT_ID=${ELEVENLABS_AGENT_ID}
      - ELEVENLABS_PHONE_ID=${ELEVENLABS_PHONE_ID}
      # ── Telegram ──
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # ── SignNow ──
      - SIGNNOW_API_KEY=${SIGNNOW_API_KEY}
      # ── MongoDB ──
      - MONGODB_URI=${MONGODB_URI}
      # ── Security ──
      - WEBHOOK_HMAC_SECRET=${WEBHOOK_HMAC_SECRET}
      # ── GitHub ──
      - GITHUB_PAT=${GITHUB_PAT}
    
    ports:
      - "1880:1880"
    
    networks:
      - shamrock-net
    
    volumes:
      # Persist all flow data, credentials, and context outside container
      - ./node_red_data:/data
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Mongoku (MongoDB Web GUI) ───────────────────────────────────────────────
  # Mongoku requires a standard mongodb:// connection string (not mongodb+srv://)
  # because Docker's internal DNS cannot resolve SRV records.
  # MONGODB_URI must be the standard (non-SRV) format:
  #   mongodb://admin:pass@shard-00-00.host:27017,shard-00-01.host:27017,...
  mongoku:
    image: huggingface/mongoku:latest
    container_name: shamrock-mongoku
    restart: unless-stopped
    environment:
      - MONGOKU_DEFAULT_HOST=${MONGODB_URI}
    ports:
      - "3100:3100"
    networks:
      - shamrock-net
    depends_on:
      - shamrock-nr
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  shamrock-net:
    driver: bridge
